name: ourmoment
description: "Our moment — 커플 일기·디데이·피드 앱"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2

  provider: ^6.1.2
  shared_preferences: ^2.3.3

  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  firebase_storage: ^12.3.7

  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

  share_plus: ^10.1.4
  app_links: ^6.3.3
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  table_calendar: ^3.1.3

  google_mobile_ads: ^5.2.0
  cached_network_image: ^3.4.1
  connectivity_plus: 6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  fake_cloud_firestore: ^3.1.0

flutter:
  uses-material-design: true
  generate: true
